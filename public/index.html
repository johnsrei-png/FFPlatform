<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBR Fantasy Salary Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --accent-primary: #2563eb;
            --accent-secondary: #1e40af;
            --accent-success: #059669;
            --accent-danger: #dc2626;
            --accent-warning: #f59e0b;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --border: #e5e7eb;
            --border-strong: #d1d5db;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .bg-grain {
            display: none;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 400;
            margin-bottom: 2rem;
        }

        .dashboard { display: none; }
        .dashboard.active { display: block; }

        .league-info {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .league-info h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        button {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9375rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--accent-secondary);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        button:active {
            transform: translateY(0);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            transition: all 0.2s ease;
        }

        .stat-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-primary);
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 2rem 0 1.25rem;
            padding-left: 0.75rem;
            border-left: 4px solid var(--accent-primary);
            color: var(--text-primary);
        }

        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem;
        }

        .team-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            transition: all 0.2s ease;
        }

        .team-card:hover {
            box-shadow: var(--shadow-md);
        }

        .team-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .team-name {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .team-owner {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .cap-space {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .cap-space.positive { color: var(--accent-primary); }
        .cap-space.negative { color: var(--accent-danger); }

        .cap-bar {
            height: 8px;
            background: var(--bg-secondary);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .cap-bar-fill {
            height: 100%;
            background: var(--accent-primary);
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .cap-bar-fill.warning { 
            background: var(--accent-warning);
        }
        
        .cap-bar-fill.danger { 
            background: var(--accent-danger);
        }

        .player-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .player-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: var(--bg-secondary);
            border-radius: 6px;
        }

        .player-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .player-position {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .player-salary {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            color: var(--accent-primary);
        }

        .keeper-cost {
            font-size: 0.75rem;
            color: var(--accent-warning);
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .spinner {
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent-primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .edit-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .edit-modal.active {
            display: flex;
        }

        .edit-modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            box-shadow: var(--shadow);
        }

        .edit-modal h3 {
            margin-bottom: 1.5rem;
            color: var(--accent-primary);
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--accent-primary);
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 1rem;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.1);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .error {
            background: rgba(255, 51, 102, 0.1);
            border: 1px solid var(--accent-danger);
            color: var(--accent-danger);
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }

        .player-item.editing {
            cursor: pointer;
            border: 2px solid var(--accent-primary);
        }

        .player-item.editing:hover {
            background: rgba(0, 255, 136, 0.1);
        }

        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            h1 {
                font-size: 1.75rem;
            }

            .subtitle {
                font-size: 0.875rem;
            }

            .league-info {
                padding: 1rem;
            }

            .league-info h2 {
                font-size: 1.25rem;
            }

            .league-info > div:last-child {
                width: 100%;
                flex-direction: column;
            }

            .league-info button {
                width: 100%;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }

            .stat-card {
                padding: 1rem;
            }

            .stat-value {
                font-size: 2rem;
            }

            .stat-label {
                font-size: 0.75rem;
            }

            .section-title {
                font-size: 1.125rem;
                margin: 1.5rem 0 1rem;
                padding-left: 0.5rem;
            }

            .teams-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .team-card {
                padding: 1rem;
            }

            .team-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.75rem;
            }

            .team-name {
                font-size: 1.125rem;
            }

            .team-owner {
                font-size: 0.8125rem;
            }

            .cap-space {
                font-size: 1rem;
            }

            .player-list {
                max-height: 500px;
            }

            .player-item {
                padding: 0.625rem;
            }

            .player-name {
                font-size: 0.875rem;
            }

            .player-position {
                font-size: 0.75rem;
            }

            .player-salary {
                font-size: 0.9375rem;
            }

            .keeper-cost {
                font-size: 0.75rem;
            }

            .edit-modal-content {
                width: 95%;
                padding: 1.5rem;
            }

            button {
                padding: 0.625rem 1.25rem;
                font-size: 0.875rem;
            }

            .button-group {
                flex-direction: column;
            }

            .button-group button {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 0.8125rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .stat-value {
                font-size: 1.75rem;
            }

            .stat-card {
                padding: 0.875rem;
            }

            .team-card {
                padding: 0.875rem;
            }

            .team-name {
                font-size: 1rem;
            }

            .player-item {
                padding: 0.5rem;
            }

            .section-title {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-grain"></div>
    
    <div class="container">
        <header>
            <h1>BBR Fantasy Salary Manager</h1>
            <p class="subtitle">Boom Boom Room • $200 Salary Cap • Keeper Dynasty League</p>
        </header>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading league data...</p>
        </div>

        <div id="dashboard" class="dashboard">
            <div class="league-info">
                <div>
                    <h2 id="leagueName">League Name</h2>
                    <div><span id="leagueSeason">2024</span> • <span id="leagueSize">Teams</span></div>
                </div>
                <div style="display: flex; gap: 0.5rem;">
                    <button onclick="loadPublicData()">🔄 Refresh</button>
                    <button id="commissionerModeBtn" onclick="toggleCommissionerMode()">✏️ Edit Mode: OFF</button>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Teams</div>
                    <div class="stat-value" id="totalTeams">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Avg Cap Space</div>
                    <div class="stat-value" id="avgCapSpace">$0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Players</div>
                    <div class="stat-value" id="totalPlayers">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">League Cap</div>
                    <div class="stat-value">$200</div>
                </div>
            </div>

            <h2 class="section-title">Team Salary Caps</h2>
            <div id="teamsGrid" class="teams-grid"></div>
        </div>
    </div>

    <div class="edit-modal" id="editModal">
        <div class="edit-modal-content">
            <h3>Edit Player Salary</h3>
            <div class="input-group">
                <label>Player Name</label>
                <input type="text" id="editPlayerName" readonly style="opacity: 0.6;">
            </div>
            <div class="input-group">
                <label>Current Salary</label>
                <input type="number" id="editPlayerSalary" min="1" max="200">
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                <button onclick="savePlayerSalary()">Save</button>
                <button class="btn-secondary" onclick="closeEditModal()">Cancel</button>
            </div>
            <div id="editError" style="display: none;" class="error"></div>
        </div>
    </div>

    <script>
        const SALARY_CAP = 200;
        let commissionerMode = false;
        let editingPlayer = null;
        let leagueId = null;

        function getKeeperEscalation(salary) {
            if (salary >= 1 && salary <= 5) return 2;
            if (salary >= 6 && salary <= 10) return 4;
            if (salary >= 11 && salary <= 20) return 6;
            if (salary >= 21 && salary <= 30) return 7;
            if (salary >= 31 && salary <= 40) return 8;
            if (salary >= 41 && salary <= 50) return 9;
            if (salary >= 51 && salary <= 60) return 10;
            if (salary >= 61 && salary <= 70) return 11;
            return 0;
        }

        async function loadPublicData() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('dashboard').classList.remove('active');

            try {
                const response = await fetch('/api/get-public-data');
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to load data');
                }

                document.getElementById('loading').style.display = 'none';
                displayDashboard(data);

            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                alert('Error loading league data: ' + error.message);
            }
        }

        function displayDashboard(data) {
            document.getElementById('dashboard').classList.add('active');

            leagueId = data.league.league_id;

            document.getElementById('leagueName').textContent = data.league.name;
            document.getElementById('leagueSeason').textContent = `Season ${data.league.season}`;
            document.getElementById('leagueSize').textContent = `${data.league.total_rosters} Teams`;

            const teams = data.rosters.map(roster => {
                const user = data.users.find(u => u.user_id === roster.owner_id);
                const teamName = user?.metadata?.team_name || user?.display_name || 'Unknown Team';
                const ownerName = user?.display_name || 'Unknown Owner';

                const players = (roster.players || []).map(playerId => {
                    const player = data.players[playerId];
                    if (!player) return null;

                    const salaryData = data.salaries[playerId];
                    const salary = salaryData ? salaryData.salary : 10;
                    const escalation = getKeeperEscalation(salary);
                    const keeperCost = salary + escalation;

                    return {
                        name: `${player.first_name || ''} ${player.last_name || ''}`.trim() || 'Unknown',
                        position: player.position || 'N/A',
                        team: player.team || 'FA',
                        salary: salary,
                        keeperCost: keeperCost,
                        escalation: escalation
                    };
                }).filter(p => p !== null).sort((a, b) => b.salary - a.salary);

                const totalSalary = players.reduce((sum, p) => sum + p.salary, 0);
                const capSpace = SALARY_CAP - totalSalary;

                return {
                    name: teamName,
                    owner: ownerName,
                    players: players,
                    totalSalary: totalSalary,
                    capSpace: capSpace,
                    wins: roster.settings?.wins || 0,
                    losses: roster.settings?.losses || 0
                };
            });

            document.getElementById('totalTeams').textContent = teams.length;
            const avgCapSpace = Math.round(teams.reduce((sum, team) => sum + team.capSpace, 0) / teams.length);
            document.getElementById('avgCapSpace').textContent = `$${avgCapSpace}`;
            const totalPlayers = teams.reduce((sum, team) => sum + team.players.length, 0);
            document.getElementById('totalPlayers').textContent = totalPlayers;

            const teamsGrid = document.getElementById('teamsGrid');
            teamsGrid.innerHTML = '';

            teams.forEach(team => {
                const capPercentage = (team.totalSalary / SALARY_CAP) * 100;
                let barClass = '';
                if (capPercentage > 95) barClass = 'danger';
                else if (capPercentage > 85) barClass = 'warning';

                const teamCard = document.createElement('div');
                teamCard.className = 'team-card';
                teamCard.innerHTML = `
                    <div class="team-header">
                        <div>
                            <div class="team-name">${team.name}</div>
                            <div class="team-owner">${team.owner} • ${team.wins}-${team.losses}</div>
                        </div>
                        <div class="cap-space ${team.capSpace >= 0 ? 'positive' : 'negative'}">
                            $${team.capSpace}
                        </div>
                    </div>
                    <div class="cap-bar">
                        <div class="cap-bar-fill ${barClass}" style="width: ${Math.min(capPercentage, 100)}%"></div>
                    </div>
                    <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem;">
                        Total: $${team.totalSalary} / $${SALARY_CAP}
                    </div>
                    <div class="player-list">
                        ${team.players.map(p => `
                            <div class="player-item">
                                <div>
                                    <div class="player-name">${p.name}</div>
                                    <div class="player-position">${p.position} • ${p.team}</div>
                                </div>
                                <div style="text-align: right;">
                                    <div class="player-salary">$${p.salary}</div>
                                    <div class="keeper-cost">Next: $${p.keeperCost}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                teamsGrid.appendChild(teamCard);
            });
        }

        function toggleCommissionerMode() {
            if (!commissionerMode) {
                const password = prompt('Enter commissioner password:');
                if (password !== 'gopackgo') {
                    alert('Incorrect password');
                    return;
                }
            }
            
            commissionerMode = !commissionerMode;
            const btn = document.getElementById('commissionerModeBtn');
            btn.textContent = commissionerMode ? '✏️ Edit Mode: ON' : '✏️ Edit Mode: OFF';
            btn.style.background = commissionerMode ? 'linear-gradient(135deg, var(--accent-primary), var(--accent-secondary))' : '';
            btn.style.color = commissionerMode ? 'var(--bg-primary)' : '';
            
            // Reload to show/hide edit functionality
            loadPublicData();
        }

        function editPlayerSalary(playerId, playerName, currentSalary) {
            if (!commissionerMode) return;
            
            editingPlayer = { playerId, leagueId };
            document.getElementById('editPlayerName').value = playerName;
            document.getElementById('editPlayerSalary').value = currentSalary;
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingPlayer = null;
        }

        async function savePlayerSalary() {
            const newSalary = parseInt(document.getElementById('editPlayerSalary').value);
            
            if (!newSalary || newSalary < 1 || newSalary > 200) {
                document.getElementById('editError').textContent = 'Salary must be between $1 and $200';
                document.getElementById('editError').style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/api/update-salary', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        playerId: editingPlayer.playerId,
                        newSalary: newSalary,
                        leagueId: editingPlayer.leagueId
                    })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'Failed to update salary');
                }

                closeEditModal();
                loadPublicData(); // Refresh data

            } catch (error) {
                document.getElementById('editError').textContent = error.message;
                document.getElementById('editError').style.display = 'block';
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadPublicData();
        });
    </script>
</body>
</html>
